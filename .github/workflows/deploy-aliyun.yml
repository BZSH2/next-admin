name: Build and Deploy Next Admin

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-aliyun.yml'
      - '.github/deploy/**'
      - 'app/**'
      - 'public/**'
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'next.config.ts'
      - 'postcss.config.mjs'
      - 'uno.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: next-admin-prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    env:
      DEPLOY_IMAGE: next-admin:prod-${{ github.sha }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/next-admin' }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'next-admin' }}
      HOST_PORT: ${{ secrets.HOST_PORT || '25001' }}
      APP_PORT: ${{ secrets.APP_PORT || '3000' }}
      APP_DOMAIN: ${{ secrets.APP_DOMAIN || 'next.admin.bzsh.fun' }}
      IMAGE_ARCHIVE_NAME: next-admin-image.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t '${{ env.DEPLOY_IMAGE }}' .

      - name: Export Docker image archive
        run: |
          docker save '${{ env.DEPLOY_IMAGE }}' | gzip > '${{ env.IMAGE_ARCHIVE_NAME }}'

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_SSH_KEY }}' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' 'mkdir -p ${{ env.DEPLOY_PATH }}'

      - name: Upload deploy files and image archive
        run: |
          scp -P '${{ secrets.DEPLOY_PORT }}' \
            docker-compose.prod.yml \
            .github/deploy/deploy.sh \
            '${{ env.IMAGE_ARCHIVE_NAME }}' \
            '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/'

      - name: Prepare remote deploy env
        run: |
          cat > .deploy.remote.env <<EOF
          DEPLOY_IMAGE=${{ env.DEPLOY_IMAGE }}
          DEPLOY_PATH=${{ env.DEPLOY_PATH }}
          CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          HOST_PORT=${{ env.HOST_PORT }}
          APP_PORT=${{ env.APP_PORT }}
          APP_DOMAIN=${{ env.APP_DOMAIN }}
          DEPLOY_IMAGE_ARCHIVE=${{ env.DEPLOY_PATH }}/${{ env.IMAGE_ARCHIVE_NAME }}
          HEALTHCHECK_URL=http://127.0.0.1:${{ env.HOST_PORT }}/api/health
          EOF
          scp -P '${{ secrets.DEPLOY_PORT }}' .deploy.remote.env '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/.deploy.remote.env'
          rm -f .deploy.remote.env

      - name: Deploy on server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' "
            set -e
            chmod +x '${{ env.DEPLOY_PATH }}/deploy.sh'
            set -a
            . '${{ env.DEPLOY_PATH }}/.deploy.remote.env'
            set +a
            bash '${{ env.DEPLOY_PATH }}/deploy.sh'
            rm -f '${{ env.DEPLOY_PATH }}/.deploy.remote.env'
          "

      - name: Deployment complete
        run: echo "✅ Next Admin image built locally in Actions and deployed successfully."
