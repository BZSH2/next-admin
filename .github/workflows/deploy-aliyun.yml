name: Build and Deploy Next Admin to Aliyun ACR

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: next-admin-prod-deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint project
        run: pnpm lint

      - name: Build project
        run: pnpm build

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: prod
    permissions:
      contents: read

    env:
      IMAGE_REPO: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPO }}
      IMAGE_LATEST: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPO }}:prod-latest
      IMAGE_SHA: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ secrets.ALIYUN_REPO }}:prod-${{ github.sha }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/next-admin' }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'next-admin' }}
      HOST_PORT: ${{ secrets.HOST_PORT || '25001' }}
      APP_PORT: ${{ secrets.APP_PORT || '3000' }}
      APP_DOMAIN: ${{ secrets.APP_DOMAIN || 'next.admin.bzsh.fun' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_LATEST }}
            ${{ env.IMAGE_SHA }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_SSH_KEY }}' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' 'mkdir -p ${{ env.DEPLOY_PATH }}'

      - name: Upload deploy files
        run: |
          scp -P '${{ secrets.DEPLOY_PORT }}' docker-compose.prod.yml deploy/deploy.sh '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/'

      - name: Prepare remote deploy env
        run: |
          cat > .deploy.remote.env <<EOF
          ACR_REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
          ACR_USERNAME=${{ secrets.ALIYUN_USERNAME }}
          ACR_PASSWORD=${{ secrets.ALIYUN_PASSWORD }}
          DEPLOY_IMAGE=${{ env.IMAGE_SHA }}
          DEPLOY_PATH=${{ env.DEPLOY_PATH }}
          CONTAINER_NAME=${{ env.CONTAINER_NAME }}
          HOST_PORT=${{ env.HOST_PORT }}
          APP_PORT=${{ env.APP_PORT }}
          APP_DOMAIN=${{ env.APP_DOMAIN }}
          HEALTHCHECK_URL=http://127.0.0.1:${{ env.HOST_PORT }}/api/health
          EOF
          scp -P '${{ secrets.DEPLOY_PORT }}' .deploy.remote.env '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/.deploy.remote.env'
          rm -f .deploy.remote.env

      - name: Deploy on server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' "
            set -e
            chmod +x '${{ env.DEPLOY_PATH }}/deploy.sh'
            set -a
            . '${{ env.DEPLOY_PATH }}/.deploy.remote.env'
            set +a
            bash '${{ env.DEPLOY_PATH }}/deploy.sh'
            rm -f '${{ env.DEPLOY_PATH }}/.deploy.remote.env'
          "

      - name: Deployment complete
        run: echo "✅ Next Admin image built, pushed, and deployed successfully."
